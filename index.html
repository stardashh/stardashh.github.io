<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Update Coming Soon</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    font-size: 3em;
  }

  #overlay {
    text-align: center;
  }

  .fade {
    animation: fadeinout 1s linear;
  }

  @keyframes fadeinout {
    0% { opacity: 0; }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

<div id="overlay">SUPER</div>

<script>
  const words = ["SUPER", "DUPER", "BIG", "UPDATE", "COMING", "SOON!"];
  let index = 0;
  const overlay = document.getElementById("overlay");

  setInterval(() => {
    index = (index + 1) % words.length;
    overlay.textContent = words[index];
    overlay.classList.remove("fade");
    void overlay.offsetWidth; // restart animation
    overlay.classList.add("fade");
  }, 1000);
</script>

</body>
</html>
